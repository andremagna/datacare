# URL di SonarCloud
sonar.host.url=https://sonarcloud.io

# Versione del progetto
sonar.projectVersion=1.0

# Percorso del codice sorgente (modifica se necessario)
sonar.sources=src

# Percorso dei binari Java compilati (modifica se necessario)
sonar.java.binaries=bin

# Codifica dei file sorgente
sonar.sourceEncoding=UTF-8
