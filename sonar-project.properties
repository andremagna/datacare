# ===============================
# SonarScanner Configuration File
# ===============================

# Chiave univoca del progetto in SonarCloud
sonar.projectKey=MY_PROJECT_KEY

# Organizzazione in SonarCloud
sonar.organization=MY_ORGANIZATION_KEY

# URL di SonarCloud
sonar.host.url=https://sonarcloud.io

# Nome progetto (opzionale)
sonar.projectName=DataCare Project

# Versione del progetto
sonar.projectVersion=1.0

# Percorso del codice sorgente: radice del repository
sonar.sources=.

# Codifica dei file sorgente
sonar.sourceEncoding=UTF-8

# Se vuoi ignorare i test (non ci sono sottocartelle test)
# sonar.tests=
