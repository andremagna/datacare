name: SonarCloud

on:
  push:
    branches:
      - main

jobs:
  sonar:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # forza Node 24 sui runner

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Sonar packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar

      - name: SonarCloud Scan
        uses: sonarsource/sonarqube-scan-action@v6  # versione aggiornata
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
