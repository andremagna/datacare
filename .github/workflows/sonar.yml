name: SonarCloud PowerShell Scan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  sonar:
    runs-on: windows-latest   # Windows 11 runner

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # forza Node.js 24
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}   # token SonarCloud dal repo secret

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17   # cambia a 20 se vuoi usare Java 20

      - name: Verify Java
        run: java -version

      - name: Cache Sonar packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar

      - name: SonarCloud Scan
        uses: sonarsource/sonarqube-scan-action@v6
        with:
          projectBaseDir: '.'   # root del repo
        env:
          SONAR_PROJECT_KEY: andremagna_datacare
          SONAR_ORGANIZATION: andremagna
          SONAR_HOST_URL: https://sonarcloud.io
